---
name: security

on:
  workflow_dispatch

permissions:
  # Required to upload SARIF file to CodeQL.
  actions: read
  # Require writing security events to upload SARIF file
  security-events: write
  # to fetch code (actions/checkout)
  contents: read

jobs:
  dependencies-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: run osv-scanner
          uses: google/osv-scanner-action/osv-scanner-action@0B718ABE67CFC1F7
          with:
            scan-args: |-
              --format sarif
              --output DependenciesAnalysisFull.sarif
              ./
          continue-on-error: true

      - name: Upload SARIF to Security Dashboard
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: DependenciesAnalysisFull.sarif
          category: dependencies
